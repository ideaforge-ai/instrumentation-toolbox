<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instrumentation Toolbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Instrumentation Toolbox</h1>
    <p>仪表工程师工具箱</p>
  </header>

  <nav class="tool-nav">
    <button class="tool-btn active" data-module="unitConverter">单位换算</button>
    <button class="tool-btn" data-module="thermocouple">热电偶查询</button>
    <button class="tool-btn" data-module="ptCompensation">温压补偿</button>
    <button class="tool-btn disabled" disabled>孔板计算</button>
    <button class="tool-btn disabled" disabled>阀门选型</button>
    <button class="tool-btn disabled" disabled>规格书生成</button>
  </nav>

  <main class="app-main">
    <!-- 单位换算 -->
    <section id="unitConverter" class="tool-section active">
      <h2>单位换算</h2>
      <div class="card">
        <label>类别
          <select id="categorySelect"></select>
        </label>
        <label>输入值
          <input id="inputValue" type="number" inputmode="decimal" placeholder="请输入数值" />
        </label>
        <div class="unit-row">
          <label>输入单位
            <select id="fromUnit"></select>
          </label>
          <button id="swapBtn" class="swap-btn" type="button">⇄</button>
          <label>输出单位
            <select id="toUnit"></select>
          </label>
        </div>
        <button id="convertBtn" class="primary-btn" type="button">换算</button>
        <div id="result" class="result-box">结果将在这里显示</div>
      </div>
    </section>

    <!-- 热电偶查询 -->
    <section id="thermocouple" class="tool-section">
      <h2>热电偶查询</h2>
      <div class="card">
        <label>分度号
          <select id="tcType">
            <option value="K">K型</option>
            <option value="E">E型</option>
            <option value="J">J型</option>
            <option value="T">T型</option>
          </select>
        </label>
        <label>换算方向
          <select id="tcMode">
            <option value="tempToMv">温度 ℃ → 热电势 mV</option>
            <option value="mvToTemp">热电势 mV → 温度 ℃</option>
          </select>
        </label>
        <label>输入值
          <input id="tcInput" type="number" inputmode="decimal" placeholder="请输入温度或 mV 值" />
        </label>
        <button id="tcCalcBtn" class="primary-btn" type="button">查询</button>
        <div id="tcResult" class="result-box">结果将在这里显示</div>
        <p class="note">注：当前按 0℃ 冷端参考计算，未加入冷端补偿。</p>
      </div>
    </section>

    <!-- 温压补偿 -->
    <section id="ptCompensation" class="tool-section">
      <h2>温压补偿</h2>
      <div class="card">
        <label>介质
          <select id="ptMedium">
            <option value="air">空气</option>
            <option value="nitrogen">氮气</option>
            <option value="oxygen">氧气</option>
            <option value="hydrogen">氢气</option>
            <option value="methane">甲烷</option>
            <option value="ethylene">乙烯</option>
            <option value="propylene">丙烯</option>
            <option value="propane">丙烷</option>
            <option value="co2">二氧化碳</option>
            <option value="steam">水蒸气</option>
            <option value="vinylacetate">醋酸乙烯</option>
          </select>
        </label>

        <label>换算方向
          <select id="ptMode">
            <option value="actualToStandard">工况体积流量 → 标况体积流量</option>
            <option value="standardToActual">标况体积流量 → 工况体积流量</option>
          </select>
        </label>

        <label>流量值
          <input id="ptFlow" type="number" inputmode="decimal" placeholder="请输入流量值" />
        </label>

        <label>操作压力 kPaG
          <input id="ptPressureG" type="number" inputmode="decimal" value="0" />
        </label>

        <label>操作温度 ℃
          <input id="ptTempC" type="number" inputmode="decimal" value="20" />
        </label>

        <label>当地大气压 kPaA
          <input id="ptAtmPressure" type="number" inputmode="decimal" value="101.325" />
        </label>

        <label>标况压力 kPaA
          <input id="ptStdPressure" type="number" inputmode="decimal" value="101.325" />
        </label>

        <label>标况温度 ℃
          <input id="ptStdTemp" type="number" inputmode="decimal" value="20" />
        </label>

        <div class="advanced-box">
          <div class="advanced-title">高级参数</div>
          <div class="pt-grid">
            <label>工况压缩因子 Z
              <input id="ptActualZ" type="number" inputmode="decimal" value="1" />
            </label>
            <label>标况压缩因子 Z
              <input id="ptStdZ" type="number" inputmode="decimal" value="1" />
            </label>
          </div>
        </div>

        <button id="ptCalcBtn" class="primary-btn" type="button">计算</button>
        <div id="ptResult" class="result-box">结果将在这里显示</div>
        <p class="note">注：适用于气体体积流量工况/标况换算。压力按表压输入，程序自动换算为绝压；密度仅作参考。</p>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <span>V1.2 · Instrumentation Toolbox</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
